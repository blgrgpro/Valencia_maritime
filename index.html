    .cat-tab-inactive { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.1); }

    .tab-count { font-size: 11px; padding: 2px 7px; border-radius: 100px; font-weight: 600; }

    /* ── Cards ── */
    .entity-card {
      background: rgba(15,32,64,0.72); backdrop-filter: blur(12px);
      border: 1px solid rgba(0,102,204,0.15); border-radius: 16px; padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; cursor: default;

    .entity-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,102,204,0.18), 0 0 0 1px rgba(0,102,204,0.35); border-color: rgba(0,102,204,0.35); }

    /* ── Rows ── */
    .entity-row {
      display: flex; align-items: flex-start; gap: 16px; padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.1s; cursor: default;
    }
    .entity-row:last-child { border-bottom: none; }
    .entity-row:hover { background: rgba(0,102,204,0.07); }

    /* ── Must Meet rows ── */
    .mm-card {
      background: rgba(15,32,64,0.7); backdrop-filter: blur(10px);
      border: 1px solid rgba(0,102,204,0.14); border-radius: 14px; padding: 18px;

function getCat(id) { return CATEGORIES.find(c => c.id === id); }
function countFor(catId) {
  if (catId === 'all') return ENTITIES.length;
  if (catId === 'mustmeet') return MUSTMEET.length;
  return ENTITIES.filter(e => e.category === catId).length;
}

/* ── Hero wave ── */
function HeroWave() {
  return (
    <div className="wave-wrap">
      <svg className="wave-svg" viewBox="0 0 2880 62" preserveAspectRatio="none">
        <path d="M0,20 C240,50 480,0 720,25 C960,50 1200,5 1440,28 C1680,50 1920,2 2160,26 C2400,50 2640,4 2880,22 L2880,62 L0,62 Z" fill="#0a1628" opacity="0.6"/>
        <path d="M0,38 C240,10 480,55 720,35 C960,15 1200,48 1440,32 C1680,16 1920,50 2160,34 C2400,18 2640,52 2880,36 L2880,62 L0,62 Z" fill="#0a1628"/>
      </svg>
    </div>

/* ── Company logo with Clearbit + initials fallback ── */
function EntityLogo({ entity, size='md' }) {
  const [state, setState] = React.useState('loading');
  const dim = size === 'lg' ? 56 : 40;
  const domain = React.useMemo(() => {
    if (!entity.website || entity.website === '#') return null;
    try { return new URL(entity.website).hostname.replace(/^www\./, ''); }
    catch { return null; }
  }, [entity.website]);

  const showImg = domain && state === 'loaded';

  return (
    <div style={{ width:dim, height:dim, borderRadius:12, flexShrink:0, overflow:'hidden',
                  background: showImg ? 'white' : entity.logoBg,
                  color: entity.logoColor, display:'flex', alignItems:'center', justifyContent:'center',
                  fontWeight:700, fontSize: size==='lg' ? 13 : 11, userSelect:'none',
                  border: showImg ? '1px solid rgba(255,255,255,0.12)' : 'none' }}>
      {domain && (
        <img src={`https://logo.clearbit.com/${domain}`} alt=""
             style={{ width: dim-10, height: dim-10, objectFit:'contain', display: showImg ? 'block' : 'none' }}
             onLoad={() => setState('loaded')} onError={() => setState('error')} />
      )}
      {!showImg && entity.logoInitials}
    </div>
  );
}

/* ── Category pill ── */
function CatPill({ entity }) {
  const cat = getCat(entity.category);
  return (
    <span style={{ fontSize:11, padding:'3px 10px', borderRadius:100, fontWeight:600,
                   background: entity.logoColor+'20', color: entity.logoBg,
                   border:`1px solid ${entity.logoColor}40` }}>
      {cat.label}
    </span>
  );
}

/* ── AUM / Funding badge ── */
function MetaBadge({ value }) {
  if (!value) return null;
  return (
    <span style={{ fontSize:10, padding:'2px 8px', borderRadius:100, fontWeight:600,
                   background:'rgba(240,165,0,0.12)', color:'#f0a500',
                   border:'1px solid rgba(240,165,0,0.28)' }}>
      {value}
    </span>
  );
}

/* ── Visit link ── */
function VisitLink({ entity }) {
  if (!entity.website || entity.website === '#') return null;
  return (
    <a href={entity.website} target="_blank" rel="noopener noreferrer"
       style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, fontWeight:600,
                color: entity.logoBg, textDecoration:'none', flexShrink:0, transition:'opacity .12s' }}
       onMouseOver={e=>e.currentTarget.style.opacity='.65'}
       onMouseOut={e=>e.currentTarget.style.opacity='1'}>
      Visit <IconLink />
    </a>
  );
}

/* ── Tags ── */
function Tags({ tags }) {
  return (
    <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
      {tags.map(t => (
        <span key={t} style={{ fontSize:10, padding:'3px 8px', borderRadius:5,
                                background:'rgba(255,255,255,0.05)', color:'rgba(255,255,255,0.4)',
                                border:'1px solid rgba(255,255,255,0.08)' }}>{t}</span>
      ))}
    </div>
  );
}

/* ── Contact block ── */
function ContactBlock({ contact, accentColor }) {
  if (!contact) return null;
  const cc = accentColor || '#0066cc';
  return (
    <div style={{ display:'flex', flexWrap:'wrap', alignItems:'center', gap:'5px 12px',
                  marginTop:8, paddingTop:8, borderTop:'1px solid rgba(255,255,255,0.07)' }}>
      <span style={{ display:'flex', alignItems:'center', gap:5, fontSize:11 }}>
        <span style={{ color:cc }}><IconPerson /></span>
        <span style={{ fontWeight:600, color:'rgba(255,255,255,0.88)' }}>{contact.name}</span>
        {contact.title && <span style={{ color:'rgba(255,255,255,0.38)' }}>· {contact.title}</span>}
      </span>
      {contact.email && (
        <a href={`mailto:${contact.email}`}
           style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, color:'rgba(255,255,255,0.36)', textDecoration:'none', transition:'color .12s' }}
           onMouseOver={e=>e.currentTarget.style.color='rgba(255,255,255,0.75)'}
           onMouseOut={e=>e.currentTarget.style.color='rgba(255,255,255,0.36)'}>
          <span style={{ color:cc }}><IconMail /></span>{contact.email}
        </a>
      )}
      {contact.phone && (
        <span style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, color:'rgba(255,255,255,0.36)' }}>
          <span style={{ color:cc }}><IconPhone /></span>{contact.phone}
        </span>
      )}
      {contact.linkedin && (
        <a href={contact.linkedin} target="_blank" rel="noopener noreferrer"
           style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, color:'rgba(255,255,255,0.36)', textDecoration:'none', transition:'color .12s' }}
           onMouseOver={e=>e.currentTarget.style.color='#60a5fa'}
           onMouseOut={e=>e.currentTarget.style.color='rgba(255,255,255,0.36)'}>
          <span style={{ color:'#60a5fa' }}><IconLinkedIn /></span>LinkedIn
        </a>
      )}
    </div>
  );
}

/* ── Relevance block ── */
function RelevanceBlock({ relevance }) {
  if (!relevance) return null;
  return (
    <div style={{ marginTop:10, padding:'10px 12px', borderRadius:8,
                  background:'rgba(0,102,204,0.06)', border:'1px solid rgba(0,102,204,0.13)' }}>
      <div style={{ fontSize:9, fontWeight:700, color:'rgba(255,255,255,0.25)',
                    letterSpacing:'.07em', textTransform:'uppercase', marginBottom:7 }}>
        Why it matters
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:'6px 12px' }}>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:'#60a5fa', marginBottom:3 }}>⚓ For 300 Maritime</div>
          <p style={{ fontSize:11, color:'rgba(255,255,255,0.45)', margin:0, lineHeight:1.55 }}>{relevance.forUs}</p>
        </div>
        <div>
          <div style={{ fontSize:10, fontWeight:700, color:'#f0a500', marginBottom:3 }}>→ For them</div>
          <p style={{ fontSize:11, color:'rgba(255,255,255,0.45)', margin:0, lineHeight:1.55 }}>{relevance.forThem}</p>
        </div>
      </div>
    </div>
  );
}

/* ── List row ── */
function EntityRow({ entity, index }) {
  return (
    <div className="entity-row fade-in" style={{ animationDelay: Math.min(index*0.04,0.5)+'s' }}>
      <div style={{ paddingTop:2 }}><EntityLogo entity={entity} /></div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:3 }}>
          <span style={{ fontWeight:700, fontSize:14, color:'rgba(255,255,255,0.92)' }}>{entity.name}</span>
          <CatPill entity={entity} />
          {entity.founded && <span style={{ fontSize:11, color:'rgba(255,255,255,0.3)' }}>Est. {entity.founded}</span>}
          <MetaBadge value={entity.aum || entity.funding} />
        </div>
        <p style={{ fontSize:12, color:'rgba(255,255,255,0.5)', lineHeight:1.6, margin:'0 0 8px',
                    overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical' }}>
          {entity.description}
        </p>
        <Tags tags={entity.tags} />
        <ContactBlock contact={entity.contact} accentColor={entity.logoColor} />
        <RelevanceBlock relevance={entity.relevance} />

      <VisitLink entity={entity} />

/* ── Gallery card ── */
function EntityCard({ entity, index }) {
  return (
    <div className="entity-card fade-in" style={{ animationDelay: Math.min(index*0.04,0.5)+'s' }}>
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
        <EntityLogo entity={entity} size="lg" />
        <VisitLink entity={entity} />
      </div>
      <div>
        <h3 style={{ fontWeight:700, fontSize:14, color:'rgba(255,255,255,0.92)', margin:'0 0 6px', lineHeight:1.3 }}>{entity.name}</h3>
        <div style={{ display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
          <CatPill entity={entity} />
          {entity.founded && <span style={{ fontSize:11, color:'rgba(255,255,255,0.3)' }}>Est. {entity.founded}</span>}
          <MetaBadge value={entity.aum || entity.funding} />
        </div>
      </div>
      <p style={{ fontSize:12, color:'rgba(255,255,255,0.5)', lineHeight:1.65, flex:1, margin:0 }}>{entity.description}</p>
      <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)', paddingTop:10 }}><Tags tags={entity.tags} /></div>
      {entity.contact && <ContactBlock contact={entity.contact} accentColor={entity.logoColor} />}
      <RelevanceBlock relevance={entity.relevance} />

/* ── Must Meet tag colors ── */
const MM_TAG = {
  'Founder':          ['rgba(240,165,0,0.14)',  '#f0a500'],
  'Investor':         ['rgba(96,165,250,0.14)', '#60a5fa'],
  'Ecosystem Builder':['rgba(52,211,153,0.14)', '#34d399'],
  'Port Authority':   ['rgba(129,140,248,0.14)','#818cf8'],
  'Community':        ['rgba(251,113,133,0.14)','#fb7185'],
};

/* ── Must Meet card ── */
function MustMeetCard({ person, index }) {
  const [bg, col] = MM_TAG[person.tag] || MM_TAG['Founder'];
  const initials = person.name.split(' ').filter(Boolean).map(n=>n[0]).slice(0,2).join('');
  return (
    <div className="mm-card fade-in" style={{ animationDelay: Math.min(index*0.05,0.6)+'s' }}>
      {/* Avatar */}
      <div style={{ width:46, height:46, borderRadius:12, background:bg, color:col, flexShrink:0,
                    display:'flex', alignItems:'center', justifyContent:'center', fontWeight:700, fontSize:14 }}>
        {initials}
      </div>
      {/* Content */}
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:3 }}>
          <span style={{ fontWeight:700, fontSize:14, color:'rgba(255,255,255,0.92)' }}>{person.name}</span>
          <span style={{ fontSize:10, padding:'2px 9px', borderRadius:100, fontWeight:600, background:bg, color:col, border:`1px solid ${col}40` }}>{person.tag}</span>
        </div>
        <div style={{ fontSize:12, color:'rgba(255,255,255,0.48)', marginBottom:8 }}>
          {person.title} <span style={{ color:'rgba(255,255,255,0.25)' }}>·</span> {person.company}
        </div>
        {/* Contact row */}
        <div style={{ display:'flex', flexWrap:'wrap', gap:'4px 14px', marginBottom:8 }}>
          {person.email && (
            <a href={`mailto:${person.email}`}
               style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:'rgba(255,255,255,0.4)', textDecoration:'none', transition:'color .12s' }}
               onMouseOver={e=>e.currentTarget.style.color=col} onMouseOut={e=>e.currentTarget.style.color='rgba(255,255,255,0.4)'}>
              <span style={{ color:col }}><IconMail /></span>{person.email}
            </a>
          )}
          {person.phone && (
            <span style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:'rgba(255,255,255,0.4)' }}>
              <span style={{ color:col }}><IconPhone /></span>{person.phone}
            </span>
          )}
          {person.linkedin && (
            <a href={person.linkedin} target="_blank" rel="noopener noreferrer"
               style={{ display:'flex', alignItems:'center', gap:5, fontSize:11, color:'rgba(255,255,255,0.4)', textDecoration:'none', transition:'color .12s' }}
               onMouseOver={e=>e.currentTarget.style.color='#60a5fa'} onMouseOut={e=>e.currentTarget.style.color='rgba(255,255,255,0.4)'}>
              <span style={{ color:'#60a5fa' }}><IconLinkedIn /></span>LinkedIn
            </a>
          )}
          {!person.email && !person.phone && !person.linkedin && (
            <span style={{ fontSize:11, color:'rgba(255,255,255,0.2)', fontStyle:'italic' }}>Contact details unavailable</span>
          )}
        </div>
        {/* Why */}
        <p style={{ fontSize:11, color:'rgba(255,255,255,0.35)', margin:0, lineHeight:1.6,
                    paddingTop:8, borderTop:'1px solid rgba(255,255,255,0.06)', fontStyle:'italic' }}>
          {person.why}
        </p>
      </div>
    </div>
  );
}

/* ── Must Meet list ── */
function MustMeetList({ search }) {
  const q = search.toLowerCase().trim();
  const filtered = MUSTMEET.filter(p =>
    !q || p.name.toLowerCase().includes(q) || p.company.toLowerCase().includes(q) ||
    p.title.toLowerCase().includes(q) || p.tag.toLowerCase().includes(q)
  );
  return (
    <div style={{ padding:20 }}>
      {/* Header strip */}
      <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:18, padding:'12px 16px',
                    background:'rgba(240,165,0,0.07)', border:'1px solid rgba(240,165,0,0.2)', borderRadius:12 }}>
        <span style={{ fontSize:18 }}>⚓</span>
        <div>
          <div style={{ fontSize:13, fontWeight:700, color:'#f0a500' }}>300 Maritime — First Outreach List</div>
          <div style={{ fontSize:11, color:'rgba(255,255,255,0.45)' }}>
            {filtered.length} contacts curated for building the Valencia founder-led maritime community
          </div>
        </div>
      </div>
      <div style={{ display:'grid', gap:12, gridTemplateColumns:'repeat(auto-fill, minmax(420px, 1fr))' }}>
        {filtered.length === 0
          ? <div style={{ gridColumn:'1/-1', textAlign:'center', padding:'60px 20px', color:'rgba(255,255,255,0.3)', fontSize:14 }}>No contacts match "{search}"</div>
          : filtered.map((p, i) => <MustMeetCard key={p.id} person={p} index={i} />)
        }
      </div>
    </div>
  );
}

/* ── Empty state ── */
function EmptyState({ search }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'80px 20px', textAlign:'center' }}>
      <div style={{ width:48, height:48, borderRadius:'50%', background:'rgba(255,255,255,0.06)', display:'flex', alignItems:'center', justifyContent:'center', marginBottom:12, color:'rgba(255,255,255,0.25)' }}><IconSearch /></div>
      {search
        ? <><p style={{ fontSize:14, fontWeight:600, color:'rgba(255,255,255,0.6)', margin:'0 0 4px' }}>No results for "{search}"</p><p style={{ fontSize:12, color:'rgba(255,255,255,0.3)', margin:0 }}>Try a different term or clear the category filter.</p></>
        : <p style={{ fontSize:14, color:'rgba(255,255,255,0.4)', margin:0 }}>No organisations found.</p>}
    </div>
  );
}

/* ── App ── */
function App() {
  const [view,           setView]           = React.useState('list');
  const [search,         setSearch]         = React.useState('');
  const [activeCategory, setActiveCategory] = React.useState('all');

  const filtered = React.useMemo(() => {
    if (activeCategory === 'mustmeet') return [];
    const q = search.toLowerCase().trim();
    return ENTITIES.filter(e => {
      const matchCat    = activeCategory === 'all' || e.category === activeCategory;
      const matchSearch = !q || e.name.toLowerCase().includes(q) || e.description.toLowerCase().includes(q) || e.tags.some(t => t.toLowerCase().includes(q));
      return matchCat && matchSearch;
    });
  }, [search, activeCategory]);

  const isMustMeet = activeCategory === 'mustmeet';

  return (
    <div style={{ minHeight:'100vh', background:'#0a1628' }}>

      {/* ── Sticky nav ── */}
      <header className="site-header">
        <div style={{ maxWidth:1060, margin:'0 auto', padding:'0 20px', height:56, display:'flex', alignItems:'center', gap:12 }}>
          <a href="https://maritime-venture.com" target="_blank" rel="noopener noreferrer"
             style={{ display:'flex', alignItems:'center', gap:10, textDecoration:'none', flexShrink:0 }}>
            <div style={{ width:30, height:30, borderRadius:8, background:'linear-gradient(135deg,#0066cc,#0044aa)', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, boxShadow:'0 2px 8px rgba(0,102,204,0.5)' }}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round">
                <path d="M2 20h20M12 4l-7 8h14L12 4zM5 12v5M19 12v5M9 12v5M15 12v5"/>
              </svg>
            </div>
            <div className="hidden sm:block">
              <div style={{ fontSize:12, fontWeight:800, color:'#fff', lineHeight:1.2 }}>300 Maritime Valencia</div>
              <div style={{ fontSize:11, color:'rgba(255,255,255,0.4)', lineHeight:1.2 }}>Ecosystem Directory</div>
            </div>
          </a>

          <div className="view-toggle">
            {[['list','List',<IconList/>],['gallery','Gallery',<IconGrid/>]].map(([v,l,icon]) => (
              <button key={v} onClick={() => setView(v)} className={`view-btn ${view===v?'view-btn-active':'view-btn-inactive'}`}>
                {icon} {l}
              </button>
            ))}
          </div>

          <div className="search-wrap" style={{ position:'relative', flex:1, maxWidth:340 }}>
            <div style={{ position:'absolute', left:11, top:'50%', transform:'translateY(-50%)', color:'rgba(255,255,255,0.3)', pointerEvents:'none' }}><IconSearch /></div>
            <input type="text" placeholder="Search organisations…" value={search} onChange={e=>setSearch(e.target.value)}
              style={{ paddingLeft:34, paddingRight:search?30:12, paddingTop:8, paddingBottom:8, fontSize:13, border:'none', width:'100%' }} />
            {search && <button onClick={()=>setSearch('')} style={{ position:'absolute', right:10, top:'50%', transform:'translateY(-50%)', background:'none', border:'none', cursor:'pointer', color:'rgba(255,255,255,0.4)', padding:0, lineHeight:0 }}><IconX /></button>}
          </div>

          <div style={{ marginLeft:'auto', display:'flex', alignItems:'center', gap:6, fontSize:11, color:'rgba(255,255,255,0.35)', flexShrink:0 }} className="hidden sm:flex">
            <span style={{ width:7, height:7, borderRadius:'50%', background:'#22c55e', boxShadow:'0 0 6px #22c55e', display:'inline-block' }}></span>
            Valencia, Spain
          </div>
        </div>
      </header>

      {/* ── Hero ── */}
      <div className="hero">
        <div className="hero-overlay" />
        <div className="hero-content">
          <div className="hero-eyebrow">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round">
              <path d="M2 20h20M12 4l-7 8h14L12 4zM5 12v5M19 12v5M9 12v5M15 12v5"/>
            </svg>
            300 Maritime Valencia
          </div>
          <h1 className="hero-title">Ecosystem Directory</h1>
          <p className="hero-subtitle">{ENTITIES.length} organisations · Ports · Startups · Investors · Networks</p>
        </div>
        <HeroWave />
      </div>

      {/* ── Main ── */}
      <div style={{ maxWidth:1060, margin:'0 auto', padding:'28px 20px 60px' }}>
        {!isMustMeet && (
          <p style={{ fontSize:12, color:'rgba(255,255,255,0.3)', marginBottom:16 }}>
            Showing <span style={{ fontWeight:700, color:'rgba(255,255,255,0.65)' }}>{filtered.length}</span> of {ENTITIES.length} organisations
          </p>
        )}

        <div className="main-panel">
          {/* Tabs */}
          <div className="tab-bar">
            {CATEGORIES.map(cat => {
              const isActive = activeCategory === cat.id;
              return (
                <button key={cat.id} onClick={() => setActiveCategory(cat.id)}
                  className={`cat-tab ${isActive ? 'cat-tab-active' : 'cat-tab-inactive'}`}>
                  {cat.label}
                  <span className="tab-count">{countFor(cat.id)}</span>

          {!isMustMeet && view === 'gallery' && (
            <div style={{ padding:20 }}>
              {filtered.length === 0
                ? <EmptyState search={search} />
                : <div style={{ display:'grid', gap:16, gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))' }}>
                    {filtered.map((e,i) => <EntityCard key={e.id} entity={e} index={i} />)}
                  </div>
              }
            </div>
          )}
        </div>
