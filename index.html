function getCat(id) { return CATEGORIES.find(c => c.id === id); }
function countFor(catId) {
  if (catId === 'all') return ENTITIES.length;
  return ENTITIES.filter(e => e.category === catId).length;
}

const IconList   = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
const IconGrid   = () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>;
const IconSearch = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const IconX      = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const IconLink   = () => <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>;

function EntityLogo({ entity, size = 'md' }) {
  const cls = size === 'lg' ? 'w-14 h-14 text-sm' : 'w-10 h-10 text-xs';
  return (
    <div className={`${cls} rounded-xl flex items-center justify-center font-bold flex-shrink-0 select-none`}
         style={{ background: entity.logoBg, color: entity.logoColor }}>
      {entity.logoInitials}
    </div>
  );
}

function EntityRow({ entity }) {
  const cat = getCat(entity.category);
  return (
    <div className="entity-row flex items-center gap-4 px-5 py-4 border-b border-gray-100 last:border-b-0">
      <EntityLogo entity={entity} />
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 flex-wrap mb-0.5">
          <span className="font-semibold text-gray-900 text-sm">{entity.name}</span>
          <span className="text-xs px-2 py-0.5 rounded-full font-medium" style={{ background: entity.logoBg, color: entity.logoColor }}>{cat.label}</span>
          {entity.founded && <span className="text-xs text-gray-400">Est. {entity.founded}</span>}
        </div>
        <p className="text-gray-500 text-xs leading-relaxed line-clamp-2">{entity.description}</p>
        <div className="flex flex-wrap gap-1 mt-1.5">
          {entity.tags.map(t => <span key={t} className="text-xs bg-gray-50 text-gray-400 border border-gray-100 px-1.5 py-0.5 rounded">{t}</span>)}
        </div>
      </div>
      {entity.website && entity.website !== '#' && (
        <a href={entity.website} target="_blank" rel="noopener noreferrer"
           className="flex-shrink-0 flex items-center gap-1 text-xs font-medium hover:underline" style={{ color: entity.logoColor }}>
          Visit <IconLink />
        </a>
      )}
    </div>
  );
}

function EntityCard({ entity }) {
  const cat = getCat(entity.category);
  return (
    <div className="entity-card bg-white border border-gray-200 rounded-xl p-5 flex flex-col gap-3">
      <div className="flex items-start justify-between gap-2">
        <EntityLogo entity={entity} size="lg" />
        {entity.website && entity.website !== '#' && (
          <a href={entity.website} target="_blank" rel="noopener noreferrer"
             className="flex items-center gap-1 text-xs font-medium hover:underline mt-1" style={{ color: entity.logoColor }}>
            Visit <IconLink />
          </a>
        )}
      </div>
      <div>
        <h3 className="font-semibold text-gray-900 text-sm leading-snug">{entity.name}</h3>
        <div className="flex items-center gap-2 mt-1 flex-wrap">
          <span className="inline-block text-xs px-2 py-0.5 rounded-full font-medium" style={{ background: entity.logoBg, color: entity.logoColor }}>{cat.label}</span>
          {entity.founded && <span className="text-xs text-gray-400">Est. {entity.founded}</span>}
        </div>
      </div>
      <p className="text-gray-500 text-xs leading-relaxed flex-1">{entity.description}</p>
      <div className="flex flex-wrap gap-1 pt-2 border-t border-gray-50">
        {entity.tags.map(t => <span key={t} className="text-xs bg-gray-50 text-gray-400 border border-gray-100 px-1.5 py-0.5 rounded">{t}</span>)}
      </div>
    </div>
  );
}

function EmptyState({ search }) {
  return (
    <div className="flex flex-col items-center justify-center py-20 text-center col-span-full">
      <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mb-3 text-gray-300"><IconSearch /></div>
      {search
        ? <><p className="text-sm font-medium text-gray-600">No results for "{search}"</p><p className="text-xs text-gray-400 mt-1">Try a different term or clear the category filter.</p></>
        : <p className="text-sm text-gray-500">No organisations found.</p>}
    </div>
  );
}

function App() {
  const [view,           setView]           = useState('list');
  const [search,         setSearch]         = useState('');
  const [activeCategory, setActiveCategory] = useState('all');

  const filtered = useMemo(() => {
    const q = search.toLowerCase().trim();
    return ENTITIES.filter(e => {
      const matchCat    = activeCategory === 'all' || e.category === activeCategory;
      const matchSearch = !q || e.name.toLowerCase().includes(q) || e.description.toLowerCase().includes(q) || e.tags.some(t => t.toLowerCase().includes(q));
      return matchCat && matchSearch;
    });
  }, [search, activeCategory]);

  return (
    <div className="min-h-screen bg-gray-50">
      <header className="sticky top-0 z-20 bg-white border-b border-gray-200">
        <div className="max-w-5xl mx-auto px-5 h-14 flex items-center gap-4">
          <a href="https://maritime-venture.com" target="_blank" rel="noopener noreferrer"
             className="flex items-center gap-2.5 mr-1 flex-shrink-0">
            <div className="w-7 h-7 rounded-md bg-gray-900 flex items-center justify-center flex-shrink-0">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round">
                <circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="22"/>
                <path d="M5 12H2a10 10 0 0 0 20 0h-3"/>
              </svg>
            </div>
            <div className="hidden sm:block">
              <div className="text-xs font-bold text-gray-900 leading-tight">300 Maritime Valencia</div>
              <div className="text-xs text-gray-400 leading-tight">Ecosystem Directory</div>
            </div>
          </a>

          <div className="flex items-center bg-gray-100 rounded-lg p-0.5 gap-0.5">
            {[['list','List',<IconList/>],['gallery','Gallery',<IconGrid/>]].map(([v,l,icon])=>(
              <button key={v} onClick={()=>setView(v)}
                className={`flex items-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-medium transition-all ${view===v?'bg-white text-gray-900 shadow-sm':'text-gray-500 hover:text-gray-700'}`}>
                {icon} {l}
              </button>
            ))}
          </div>

          <div className="relative flex-1 max-w-sm">
            <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"><IconSearch /></div>
            <input type="text" placeholder="Search organisations..." value={search} onChange={e=>setSearch(e.target.value)}
              className="w-full pl-9 pr-7 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 placeholder-gray-400 bg-gray-50 transition-all"/>
            {search && <button onClick={()=>setSearch('')} className="absolute right-2.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"><IconX /></button>}
          </div>

          <div className="ml-auto hidden sm:flex items-center gap-1.5 text-xs text-gray-400 flex-shrink-0">
            <span className="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
            Valencia, Spain
          </div>
        </div>
      </header>

      <div className="max-w-5xl mx-auto px-5 pt-5 pb-16">
        <p className="text-xs text-gray-400 mb-4">
          Showing <span className="font-semibold text-gray-700">{filtered.length}</span> of {ENTITIES.length} organisations
        </p>

        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
          <div className="border-b border-gray-100">
            <div className="flex overflow-x-auto">
              {CATEGORIES.map(cat => {
                const isActive = activeCategory === cat.id;
                return (
                  <button key={cat.id} onClick={()=>setActiveCategory(cat.id)}
                    className={`cat-tab flex items-center gap-1.5 px-4 py-3 text-sm font-medium border-b-2 -mb-px ${isActive?'border-gray-900 text-gray-900':'border-transparent text-gray-400 hover:text-gray-600'}`}>
                    {cat.label}
                    <span className={`text-xs px-1.5 py-0.5 rounded-full ${isActive?'bg-gray-900 text-white':'bg-gray-100 text-gray-500'}`}>{countFor(cat.id)}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div className="px-5 py-2.5 text-xs text-gray-400 bg-gray-50 border-b border-gray-100">
            {getCat(activeCategory)?.desc}
          </div>

          {view==='list' && (
            <div>
              {filtered.length===0 ? <EmptyState search={search}/> : filtered.map(e=><EntityRow key={e.id} entity={e}/>)}
            </div>
          )}

          {view==='gallery' && (
            <div className="p-5">
              {filtered.length===0
                ? <EmptyState search={search}/>
                : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    {filtered.map(e=><EntityCard key={e.id} entity={e}/>)}
                  </div>
              }
            </div>
          )}
        </div>

        <div className="mt-8 text-center">
          <p className="text-xs text-gray-400">
            <a href="https://maritime-venture.com" target="_blank" rel="noopener noreferrer"
               className="font-medium text-gray-600 hover:text-gray-900">maritime-venture.com</a>
            {' '}· Valencia Maritime Innovation Ecosystem ·{' '}
            <a href="mailto:ecosistema@valenciaport.com" className="hover:text-gray-600">Submit an organisation ↗</a>
          </p>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
